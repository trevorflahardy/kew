# kew_config.yaml — project-level kew configuration
# See: https://github.com/futur/kew

defaults:
  model: gemma4:26b
  provider: ollama
  workers: 4
  timeout: 5m

ollama:
  url: http://localhost:11434
  embedding_model: nomic-embed-text

# Model aliases
aliases:
  fast: gemma4:26b
  # smart: claude-sonnet-4-20250514
  # code: codellama

